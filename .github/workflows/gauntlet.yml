name: Gauntlet

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install NASM
        run: sudo apt-get install -y nasm

      - name: Build Stage 0 (lexer)
        run: cd stage0 && make

      - name: Build Stage 1 (compiler)
        run: |
          cd stage1
          nasm -f elf64 -o compiler.o compiler.asm
          ld -o compiler compiler.o

      - name: Build Stage 2 (Loon compiler)
        run: |
          ./stage0/lexer stage2/compiler.loon | ./stage1/compiler > /tmp/loon.asm
          nasm -f elf64 -o /tmp/loon.o /tmp/loon.asm
          ld -o /tmp/loon /tmp/loon.o

      - name: Verify self-hosting
        run: |
          /tmp/loon stage2/compiler.loon > /tmp/loon2.asm 2>/dev/null
          nasm -f elf64 -o /tmp/loon2.o /tmp/loon2.asm
          ld -o /tmp/loon2 /tmp/loon2.o
          /tmp/loon2 stage2/compiler.loon > /tmp/loon3.asm 2>/dev/null
          diff /tmp/loon2.asm /tmp/loon3.asm

      - name: Run gauntlet
        run: LOON_COMPILER=/tmp/loon ./gauntlet/run.sh
