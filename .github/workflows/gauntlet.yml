name: Loon Gauntlet

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install NASM
        run: sudo apt-get install -y nasm

      - name: Build Stage 0 (lexer)
        run: cd stage0 && make

      - name: Build Stage 1 (compiler)
        run: |
          cd stage1
          nasm -f elf64 -o compiler.o compiler.asm
          ld -o compiler compiler.o

      - name: Build Stage 2 (Loon compiler)
        run: |
          ./stage0/lexer stage2/compiler.loon | ./stage1/compiler > /tmp/loon.asm
          nasm -f elf64 -o /tmp/loon.o /tmp/loon.asm
          ld -o /tmp/loon /tmp/loon.o

      - name: Verify self-hosting
        run: |
          /tmp/loon stage2/compiler.loon > /tmp/loon2.asm 2>/dev/null
          nasm -f elf64 -o /tmp/loon2.o /tmp/loon2.asm
          ld -o /tmp/loon2 /tmp/loon2.o
          /tmp/loon2 stage2/compiler.loon > /tmp/loon3.asm 2>/dev/null
          diff /tmp/loon2.asm /tmp/loon3.asm

      - name: Run gauntlet
        run: |
          LOON_COMPILER=/tmp/loon ./gauntlet/run.sh | tee /tmp/gauntlet_output.txt
          # run.sh does not exit non-zero on failure, so check FAIL count
          if grep -qP '^\x1b\[0;31mFail:\s+[1-9]' /tmp/gauntlet_output.txt || \
             grep -qP 'Fail:\s+[1-9]' /tmp/gauntlet_output.txt; then
            echo "::error::Gauntlet had test failures"
            exit 1
          fi

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install NASM
        run: sudo apt-get install -y nasm

      - name: Build Stage 0 (lexer)
        run: cd stage0 && make

      - name: Build Stage 1 (compiler)
        run: |
          cd stage1
          nasm -f elf64 -o compiler.o compiler.asm
          ld -o compiler compiler.o

      - name: Build Stage 2 (Loon compiler)
        run: |
          ./stage0/lexer stage2/compiler.loon | ./stage1/compiler > /tmp/loon.asm
          nasm -f elf64 -o /tmp/loon.o /tmp/loon.asm
          ld -o /tmp/loon /tmp/loon.o

      - name: Package release binary
        run: |
          mkdir -p /tmp/release/loon-linux-x86_64
          cp /tmp/loon /tmp/release/loon-linux-x86_64/loon
          cd /tmp/release
          tar czf loon-linux-x86_64.tar.gz loon-linux-x86_64/
          sha256sum loon-linux-x86_64.tar.gz > loon-linux-x86_64.tar.gz.sha256

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            /tmp/release/loon-linux-x86_64.tar.gz \
            /tmp/release/loon-linux-x86_64.tar.gz.sha256 \
            --title "Loon ${{ github.ref_name }}" \
            --generate-notes
